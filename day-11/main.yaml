name: Day 11 CI Pipeline - Remote Registry

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the repository code into the runner
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run pytest — pipeline stops here if tests fail
      - name: Run Tests
        run: |
          pytest test_app.py -v

      # Step 5: Login to Docker Hub using GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6: Build and Push with TWO tags:
      #   - :latest      (always points to the newest image)
      #   - :v<run_number> (unique version, e.g. v15, v16 — enables rollback)
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/meetmux-app:latest
            ${{ secrets.DOCKER_USERNAME }}/meetmux-app:v${{ github.run_number }}