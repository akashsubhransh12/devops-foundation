name: Day 10 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the repository code into the runner
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install all Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the pytest test suite — pipeline fails here if tests break
      - name: Run Tests
        run: |
          pytest test_app.py -v

      # Step 5: Build the Docker image — pipeline fails here if Dockerfile is broken
      - name: Run Docker Build
        run: |
          docker build -t meetmux-test-image .

